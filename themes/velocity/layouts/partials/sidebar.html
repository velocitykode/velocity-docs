<aside class="docs-sidebar" role="navigation" aria-label="Documentation navigation">
  {{ $currentPage := . }}
  {{ $sections := site.GetPage "docs" }}

  {{ if $sections }}
    {{ range $sections.Sections }}
      <div class="sidebar-section">
        <h3 class="sidebar-section-title"><span>{{ .Title }}</span></h3>
        <ul class="sidebar-nav">
          <!-- Section index page -->
          <li>
            <a href="{{ .Permalink }}" class="sidebar-link{{ if eq $currentPage.Permalink .Permalink }} active{{ end }}">
              overview
            </a>
          </li>
          <!-- Child pages -->
          {{ range .Pages }}
            <li>
              <a href="{{ .Permalink }}" class="sidebar-link sidebar-link--nested{{ if eq $currentPage.Permalink .Permalink }} active{{ end }}">
                {{ .Title }}
              </a>
            </li>
          {{ end }}
        </ul>
      </div>
    {{ end }}
  {{ end }}

  <!-- Scroll to top - pinned at the bottom of the sticky sidebar. -->
  <button
    type="button"
    id="scroll-to-top"
    class="scroll-to-top"
    aria-label="Scroll to top"
    hidden
  >
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="scroll-to-top-label">top</span>
  </button>
</aside>
