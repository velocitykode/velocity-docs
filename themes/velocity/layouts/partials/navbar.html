<header class="navbar" role="banner">
  <!-- Top status-line strip (V3) -->
  <div class="navbar-status" aria-hidden="true">
    <div class="navbar-status-group">
      <span class="navbar-status-live">
        <span class="navbar-status-dot"></span>
        <span>live</span>
      </span>
      <span class="navbar-status-chip navbar-status-chip--sm">build:pre-1.0</span>
      <span class="navbar-status-chip navbar-status-chip--md">go/1.26+</span>
    </div>
    <div class="navbar-status-group">
      <span class="navbar-status-chip navbar-status-chip--sm">v0.22.0</span>
      <span class="navbar-status-chip navbar-status-chip--md navbar-status-chip--dim">~/velocity</span>
    </div>
  </div>

  <!-- Main row -->
  <div class="navbar-inner">
    <!-- Logo - text mark: velocity_ with phosphor cursor -->
    <a href="https://velocity.velocitykode.com/" class="navbar-logo" aria-label="Velocity Home">
      <span class="logo-mark">velocity<span class="logo-cursor">_</span></span>
    </a>

    <!-- Actions -->
    <div class="navbar-actions">
      <!-- Theme toggle - segmented [ dark | light ] chip -->
      <button
        type="button"
        class="theme-toggle-v3"
        id="theme-toggle"
        data-active="dark"
        aria-label="Switch to light theme"
        aria-pressed="false"
        title="Switch to light theme"
      >
        <span class="bracket">[</span>
        <span class="opt" data-opt="dark">dark</span>
        <span class="pipe">|</span>
        <span class="opt" data-opt="light">light</span>
        <span class="bracket">]</span>
      </button>

      <!-- GitHub link -->
      <a href="https://github.com/velocitykode/velocity" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        <span>github</span>
      </a>

      <!-- Documentation CTA -->
      {{ if not (hasPrefix .RelPermalink "/docs") }}
      <a href="{{ "docs/" | relURL }}" class="navbar-docs-btn">
        <span class="docs-cta-label docs-cta-long">Documentation</span>
        <span class="docs-cta-label docs-cta-short">Docs</span>
      </a>
      {{ end }}

      <!-- Search trigger (desktop) -->
      <button type="button" class="search-trigger" id="search-trigger" aria-label="Search documentation">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" aria-hidden="true">
          <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16z" stroke="currentColor" stroke-width="1.5"/>
          <path d="m19 19-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Search...</span>
        <kbd><span class="kbd-mac">&#8984;</span><span class="kbd-other">Ctrl</span>K</kbd>
      </button>

      {{ if hasPrefix .RelPermalink "/docs" }}
      <!-- Search button (docs pages - mobile only) -->
      <button type="button" class="search-btn" id="search-btn" aria-label="Search documentation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Mobile menu toggle (docs pages only) -->
      <button type="button" class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round"/>
        </svg>
        <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
        </svg>
      </button>
      {{ end }}
    </div>
  </div>

  <!-- Mobile menu dropdown (docs pages only) -->
  {{ if hasPrefix .RelPermalink "/docs" }}
  <div class="mobile-menu" id="mobile-menu">
    <nav class="mobile-menu-nav">
      <a href="{{ "docs/" | relURL }}" class="mobile-menu-link">&gt; Docs</a>
      <a href="https://github.com/velocitykode/velocity" class="mobile-menu-link" target="_blank" rel="noopener noreferrer">&gt; GitHub</a>
    </nav>
  </div>
  {{ end }}
</header>
